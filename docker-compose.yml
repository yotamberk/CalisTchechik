version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: calist
      POSTGRES_PASSWORD: calist_dev
      POSTGRES_DB: calistchechik
    ports:
      - '5433:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
